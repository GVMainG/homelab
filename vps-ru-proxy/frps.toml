# frps.toml — шаблон конфигурации FRP-сервера
#
# ВНИМАНИЕ: Это шаблон. Плейсхолдеры ${FRP_TOKEN} и ${FRP_DASHBOARD_PASSWORD}
# подставляются setup.sh через envsubst. Результат записывается в frps/frps.toml.
# Не редактируйте frps/frps.toml вручную — он перезаписывается при пересоздании.

# Порт, на котором frps принимает входящие туннельные соединения от frpc
bindPort = 7000

# ── Аутентификация ────────────────────────────────────────────────────────────
# Метод: токен. Токен должен совпадать на frps (VPS) и frpc (домашний сервер).
[auth]
method = "token"
token = "${FRP_TOKEN}"

# ── Веб-дашборд ───────────────────────────────────────────────────────────────
# Мониторинг активных туннелей и статистика.
# Доступен на http://<VPS_IP>:7500 — закрыть firewall для публичного доступа.
[webServer]
addr     = "0.0.0.0"
port     = 7500
user     = "admin"
password = "${FRP_DASHBOARD_PASSWORD}"

# ── Логирование ───────────────────────────────────────────────────────────────
# Вывод в stdout контейнера — просмотр через: docker compose logs -f frps
[log]
to    = "console"
level = "info"

# ── Транспорт ─────────────────────────────────────────────────────────────────
[transport]
# Максимальное число предустановленных соединений на одного клиента
maxPoolCount = 10
# TCP-мультиплексирование: несколько туннелей поверх одного TCP-соединения
tcpMux = true
