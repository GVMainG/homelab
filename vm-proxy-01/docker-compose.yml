services:
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    environment:
      TZ: Europe/Moscow
    volumes:
      - ./data/npm:/data
      - ./data/letsencrypt:/etc/letsencrypt
    # bridge-сеть по умолчанию — стабильнее host-network для NPM
    networks:
      - default
