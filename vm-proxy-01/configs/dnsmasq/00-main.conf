# dnsmasq — основной конфиг
# Переменные подставляются через envsubst из deploy-dnsmasq.sh

# Не использовать /etc/resolv.conf для upstream-ов (задаём явно ниже)
no-resolv

# Слушать только указанный интерфейс
interface=${LAN_IFACE}
bind-interfaces

# Upstream DNS-серверы (пробелом)
server=${DNS_UPSTREAMS}

# Строгий порядок опроса upstream (первый доступный — приоритетный)
strict-order

# TTL для локальных записей = 0 (клиенты не кэшируют, полезно при частых сменах)
local-ttl=0

# Раскомментировать для отладки (смотреть: journalctl -u dnsmasq -f)
#log-queries
