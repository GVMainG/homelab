# dnsmasq — Split-DNS конфигурация
# Все запросы *.host.loc направляются на локальный proxy
# Переменные подставляются через envsubst из deploy-dnsmasq.sh

# Wildcard: любой поддомен TARGET_DOMAIN -> PROXY_IP
address=/.${TARGET_DOMAIN}/${PROXY_IP}

# Блокировка утечек: домены .lan резолвятся только локально
local=/lan/
