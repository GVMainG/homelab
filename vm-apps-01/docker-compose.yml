# Веб-интерфейс для загрузки видео с YouTube и других платформ
services:
  metube:
    # Образ: ghcr.io/alexta69/metube (на основе yt-dlp)
    image: ghcr.io/alexta69/metube:latest
    container_name: metube
    restart: unless-stopped
    env_file: .env
    environment:
      # Формат видео: лучшее видео + лучший звук или лучший общий файл
      YTDL_FORMAT: ${YTDL_FORMAT:-bestvideo+bestaudio/best}
      # Формат извлекаемого звука (mp3, m4a, opus, vorbis, wav, aac)
      YTDL_EXTRACT_AUDIO_FORMAT: ${YTDL_EXTRACT_AUDIO_FORMAT:-m4a}
      # Качество звука в кбит/с
      YTDL_EXTRACT_AUDIO_QUALITY: ${YTDL_EXTRACT_AUDIO_QUALITY:-192}
      # Сохранять оригинальный звук при извлечении
      YTDL_KEEP_ORIGINAL_AUDIO: ${YTDL_KEEP_ORIGINAL_AUDIO:-false}
      # Использовать FFI для выбора формата
      YTDL_PREFER_FFI: ${YTDL_PREFER_FFI:-false}
    ports:
      # Веб-интерфейс доступен на порту 8081
      - "8081:8081"
    volumes:
      # Том для сохранения загруженных видео
      - metube-downloads:/downloads
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8081/"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 30s

  planka:
    # Kanban доска для управления проектами
    image: plankanban/planka:1.122.0
    container_name: planka
    restart: unless-stopped
    env_file: .env
    environment:
      # Подключение к PostgreSQL на vm-db-01
      DATABASE_URL: postgresql://${PLANKA_DB_USER}:${PLANKA_DB_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${PLANKA_DB_NAME}
      # Базовый URL для доступа к приложению
      BASE_URL: http://${PLANKA_BASE_URL:-192.168.1.XX:8082}
      # Аутентификация (может быть отключена для простых развертываний)
      SECRET_KEY: ${PLANKA_SECRET_KEY}
    ports:
      # Веб-интерфейс доступен на порту 8082
      - "8082:1337"
    volumes:
      # Том для хранения загруженных файлов
      - planka-attachments:/app/attachments
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:1337/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# Именованные томы
volumes:
  metube-downloads:
  planka-attachments:
