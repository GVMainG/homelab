# Веб-интерфейс для загрузки видео с YouTube и других платформ
services:
  metube:
    # Образ: ghcr.io/alexta69/metube (на основе yt-dlp)
    image: ghcr.io/alexta69/metube:latest
    container_name: metube
    restart: unless-stopped
    env_file: .env
    environment:
      # Формат видео: лучшее видео + лучший звук или лучший общий файл
      YTDL_FORMAT: ${YTDL_FORMAT:-bestvideo+bestaudio/best}
      # Формат извлекаемого звука (mp3, m4a, opus, vorbis, wav, aac)
      YTDL_EXTRACT_AUDIO_FORMAT: ${YTDL_EXTRACT_AUDIO_FORMAT:-m4a}
      # Качество звука в кбит/с
      YTDL_EXTRACT_AUDIO_QUALITY: ${YTDL_EXTRACT_AUDIO_QUALITY:-192}
      # Сохранять оригинальный звук при извлечении
      YTDL_KEEP_ORIGINAL_AUDIO: ${YTDL_KEEP_ORIGINAL_AUDIO:-false}
      # Использовать FFI для выбора формата
      YTDL_PREFER_FFI: ${YTDL_PREFER_FFI:-false}
    ports:
      # Веб-интерфейс доступен на порту 8081
      - "8081:8081"
    volumes:
      # Том для сохранения загруженных видео
      - metube-downloads:/downloads
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8081/"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 30s

  planka:
    # Kanban доска для управления проектами
    image: ghcr.io/plankanban/planka:latest
    container_name: planka
    restart: unless-stopped
    env_file: .env
    environment:
      # Подключение к PostgreSQL на vm-db-01
      DATABASE_URL: postgresql://${PLANKA_DB_USER}:${PLANKA_DB_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${PLANKA_DB_NAME}
      # Базовый URL для доступа к приложению (нужен для фронтенда)
      BASE_URL: http://${PLANKA_BASE_URL:-192.168.1.XX:3000}
      # SECRET_KEY для шифрования сессий — МЕНЯТЬ НЕЛЬЗЯ после первого запуска
      SECRET_KEY: ${PLANKA_SECRET_KEY}
      # Разрешить регистрацию новых пользователей
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
      # Создать админа при первом запуске (Planka-специфичные переменные)
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD}
      DEFAULT_ADMIN_NAME: ${DEFAULT_ADMIN_NAME}
    ports:
      # Веб-интерфейс доступен на порту 3000
      - "3000:1337"
    volumes:
      # Том для хранения данных, загруженных файлов и кеша
      - planka-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:1337"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# Именованные томы
volumes:
  metube-downloads:
  planka-data:
